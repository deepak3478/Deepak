controller_manager:
  ros__parameters:
    update_rate: 30  # Hz

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# ── Diff Drive Controller ─────────────────────────────────────────────────────
# Joint names match EXACTLY what's in mobile_base.xacro
diff_drive_controller:
  ros__parameters:
    left_wheel_names:  ["base_left_wheel_joint"]
    right_wheel_names: ["base_right_wheel_joint"]

    # Match mobile_base.xacro dimensions exactly
    wheel_separation: 0.45   # (base_width + wheel_length) / 2 * 2 = (0.4 + 0.05)/2 * 2
    wheel_radius:     0.1

    # Odometry frames
    odom_frame_id:  odom
    base_frame_id:  base_footprint

    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # Velocity limits
    linear.x.has_velocity_limits:    true
    linear.x.max_velocity:            0.5   # m/s
    linear.x.min_velocity:           -0.5
    linear.x.has_acceleration_limits: true
    linear.x.max_acceleration:        0.5
    linear.x.min_acceleration:       -0.5

    angular.z.has_velocity_limits:    true
    angular.z.max_velocity:            1.0   # rad/s
    angular.z.min_velocity:           -1.0
    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration:        1.0
    angular.z.min_acceleration:       -1.0

    # Safety: stop if no cmd_vel for 0.5s
    cmd_vel_timeout: 0.5

    publish_rate: 30.0
    enable_odom_tf: true
    preserve_turning_radius: true
    use_stamped_vel: false
